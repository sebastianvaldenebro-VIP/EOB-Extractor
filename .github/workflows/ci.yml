name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npx vitest run --coverage

  security:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  sast:
    name: SAST & Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Semgrep SAST
        run: |
          pip install semgrep
          semgrep scan --config auto --error .

      - name: Trivy dependency vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  iac-scan:
    name: IaC Compliance Scan
    needs: [lint-and-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Synthesize CloudFormation templates
        run: npx cdk synth -c bucketName=bucket-specialops-sandbox --require-approval never
        env:
          CDK_DEFAULT_ACCOUNT: "000000000000"
          CDK_DEFAULT_REGION: us-east-1

      - name: Checkov IaC compliance scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: cdk.out
          framework: cloudformation
          soft_fail: false
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif

  synth:
    name: CDK Synth
    needs: [lint-and-test, security, sast]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Synthesize CloudFormation template
        run: npx cdk synth

  conventional-commits:
    name: PR Title (Conventional Commits)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Check PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Checking PR title: $PR_TITLE"
          if echo "$PR_TITLE" | grep -qP '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore)(\(.+\))?: .+'; then
            echo "PR title follows Conventional Commits format."
          else
            echo "::warning::PR title does not follow Conventional Commits format."
            echo "Expected: type(scope): description"
            echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore"
            exit 1
          fi
